name = "mirutina"
compatibility_date = "2026-03-29"
main = "worker.js"

[assets]
directory = "."
binding = "ASSETS"
run_worker_first = true

[[kv_namespaces]]
binding = "DB"
id = "405c9c9064344dcd91cb82aac6d38994"

[[r2_buckets]]
binding = "PHOTOS"
bucket_name = "mi-rutina-fotos"

# Crons:
#  - 03:00 UTC daily  → 22:00 Colombia, reporte diario de comidas
#  - 15:00 UTC sábado → 10:00 Colombia, reporte semanal
#  - 18:00 UTC daily  → 13:00 Colombia, recordatorio si no se ha entrenado
[triggers]
crons = ["0 3 * * *", "0 15 * * 6", "0 18 * * *"]
